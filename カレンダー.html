<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Tab</title>
    <link rel="stylesheet" href="カレンダー.css">
</head>
<body>

<div class="phone">

    <div class="header">
        <h1>カレンダー</h1>
        <p id="selectedDate">日付を選択してください</p>
    </div>

    <div class="calendar">

        <div class="week">日</div>
        <div class="week">月</div>
        <div class="week">火</div>
        <div class="week">水</div>
        <div class="week">木</div>
        <div class="week">金</div>
        <div class="week">土</div>

        <div id="calendarDays"></div>

    </div>

    <div class="schedule-area">
        <h2>予定一覧</h2>
        <div id="scheduleList"></div>
    </div>

</div>

<button class="fab">＋</button>

<script src="カレンダー.js"></script>

</body>
</html>
